<!DOCTYPE html>
<html lang="en">
<head>
    <title>BridgeTrack - Student Registration</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="bridgetrack.css" rel="stylesheet">
</head>
<body>
<header class="home">
    <h1><a href="homepage">BridgeTrack - Registration</a></h1>
</header>
<nav>
    <ul>
        <li><a href="homepage">Home</a></li>
        <li><a href="registration">Registration</a></li>
        <li><a href="admindashboard">Administration</a></li>
    </ul>
</nav>
<main>
    <section class="form-container">
        <h2>Student Registration</h2>
        <form id="registrationForm" class="registration-form">
            <div class="form-group">
                <label>First Name *</label>
                <input type="text" id="firstName" required>
            </div>
            <div class="form-group">
                <label>Last Name *</label>
                <input type="text" id="lastName" required>
            </div>
            <div class="form-group">
                <label>Email *</label>
                <input type="email" id="email" required>
                <span class="duplicate-check" style="display:none;">Email already registered</span>
            </div>
            <div class="form-group">
                <label>Phone *</label>
                <input type="tel" id="phone" required>
            </div>
            <div class="form-group">
                <label>Birthdate (if under 18) *</label>
                <input type="date" id="birthdate">
            </div>
            <button type="submit" class="btn">Register</button>
        </form>
    </section>
</main>
<footer>
    <div>
        <script src="bridgetrack.js"></script>
        <script>
            initRegistrationForm();
        </script>
    </div>
    <div>
            <script>
                document.write("This page was last modified on: " + document.lastModified);
            </script>
    </div>
</footer>
</body>
</html>
