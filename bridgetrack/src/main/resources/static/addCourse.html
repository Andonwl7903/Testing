<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Add New Course</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="/bridgetrack.css">

<style>
body {
    margin: 0;
    font-family: Arial, Helvetica, sans-serif;
    background: #f1f3f6;
    display: flex;
    min-height: 100vh;
}

.admin-sidebar {
    width: 280px;
    background: #ffffff;
    border-right: 1px solid #d6dce5;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
}

.admin-sidebar-top {
    display: flex;
    flex-direction: column;
}

.admin-logo {
    padding: 16px 20px;
    border-bottom: 1px solid #e6ebf1;
    margin-bottom: 8px;
}

.admin-logo img {
    width: 200px;
    height: auto;
}

.admin-sidebar h2 {
    padding: 0 24px 12px;
    margin: 0;
    font-size: 18px;
    color: #1c3557;
}

.admin-sidebar ul {
    list-style: none;
    margin: 0;
    padding: 0;
}

.admin-sidebar a {
    display: block;
    padding: 12px 24px;
    color: #2d3d65;
    text-decoration: none;
    border-left: 4px solid transparent;
}

.admin-sidebar a:hover,
.admin-sidebar a.active {
    background: #eef4fa;
    font-weight: bold;
    border-left: 4px solid #1a5ea8;
}

.admin-sidebar-bottom {
    padding: 18px 24px;
    border-top: 1px solid #e6ebf1;
}

.admin-main {
    flex: 1;
    padding: 32px;
}

.admin-section {
    background: white;
    border: 1px solid #d6dce5;
    border-radius: 6px;
    overflow: hidden;
    max-width: 700px;
}

.admin-section-header {
    background: #dfe7f2;
    padding: 16px 20px;
    font-weight: bold;
    color: #1c3557;
    border-bottom: 1px solid #d6dce5;
}

.admin-section-body {
    padding: 24px 20px;
}

.form-group {
    margin-bottom: 16px;
}

.form-group label {
    display: block;
    font-weight: bold;
    margin-bottom: 6px;
}

.form-group input,
.form-group select {
    width: 100%;
    padding: 10px;
    border: 1px solid #c8d0db;
    border-radius: 3px;
}

.form-group input[type="checkbox"] {
    width: auto;
}

.btn-submit {
    background: #1c3557;
    color: white;
    border: none;
    padding: 10px 18px;
    border-radius: 4px;
    font-weight: bold;
    cursor: pointer;
}

.btn-submit:hover {
    background: #0c6ea3;
}
</style>
</head>

<body>

<aside class="admin-sidebar">
<div class="admin-sidebar-top">

<div class="admin-logo">
<img src="/bridgetrack-logo.jpeg">
</div>

<h2>Admin Dashboard</h2>

<ul>
<li><a href="/admindashboard.html">Dashboard</a></li>
<li><a class="active" href="#">Courses & Programs</a></li>
<li><a href="#">Sections</a></li>
<li><a href="#">Instructors</a></li>
<li><a href="#">Students</a></li>
<li><a href="#">Enrollments</a></li>
<li><a href="#">Attendance Reports</a></li>
</ul>

</div>

<div class="admin-sidebar-bottom">
<a href="/login.html">Logout</a>
</div>

</aside>

<main class="admin-main">

<div class="admin-section">

<div class="admin-section-header">
Add New Course
</div>

<div class="admin-section-body">

<form th:action="@{/courses/add}" th:object="${course}" method="post">

<div class="form-group">
<label>Program</label>
<select th:field="*{program}">
<option th:each="program : ${programs}"
        th:value="${program}"
        th:text="${program.programName}">
</option>
</select>
</div>

<div class="form-group">
<label>Code</label>
<input type="text" th:field="*{courseCode}" required>
</div>

<div class="form-group">
<label>Title</label>
<input type="text" th:field="*{courseName}" required>
</div>

<div class="form-group">
<label>Description</label>
<input type="text" th:field="*{description}">
</div>

<div class="form-group">
<label>Modality</label>
<select th:field="*{modality}" required>
<option value="Online">Online</option>
<option value="In-Person">In-Person</option>
<option value="SOM">SOM</option>
</select>
</div>

<div class="form-group">
<label>
<input type="checkbox" th:field="*{requiresPrereq}">
Requires Prerequisite
</label>
</div>

<div class="form-group">
<label>Category</label>
<select th:field="*{category}" required>
<option value="digital_literacy">Digital Literacy</option>
<option value="grammar">Grammar</option>
<option value="listening">Listening</option>
<option value="math">Math</option>
<option value="reading">Reading</option>
<option value="speaking">Speaking</option>
<option value="study_skills">Study Skills</option>
<option value="writing">Writing</option>
</select>
</div>

<button type="submit" class="btn-submit">Save Course</button>

</form>

</div>
</div>

</main>

</body>
</html>
